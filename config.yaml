windows:
  train: { start: 2018, end: 2023 }
  test:  { start: 2024, end: 2025 }

# Risk thresholds (for label construction)
thresholds:
  visibility_km_lt: 3.0
  wind_knots_gt: 25.0
  horizon_hours: 2          # predict 1..2h ahead

# NOAA ISD data types to pull
# TMP (temp), DEW (dewpoint), VIS (visibility), WND (wind: dir/speed),
# SLP (sea-level pressure), CIG (cloud ceiling), AA1 (precipitation)
noaa_data_types: [TMP, DEW, VIS, WND, SLP, CIG, AA1]

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  figures_dir: reports/figures
